<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversation Data Review</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d26;
    --surface2: #222535;
    --border: #2e3148;
    --accent: #6c8ef5;
    --accent2: #a78bfa;
    --text: #e2e8f0;
    --muted: #8892a4;
    --chat-user: #1e3a5f;
    --chat-agent: #1e2d1e;
    --tag-grounded: #14532d;
    --tag-ungrounded: #1e3a5f;
    --tag-identity: #3b1f5e;
    --tag-chat: #1c3050;
    --tag-voice: #501c1c;
    --font: 'Inter', system-ui, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.02em; }
  header .stats { font-size: 13px; color: var(--muted); }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 12px;
  }

  .filter-section { margin-bottom: 20px; }
  .filter-section h3 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .filter-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 6px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    user-select: none;
    transition: background 0.12s;
  }
  .filter-option:hover { background: var(--surface2); }
  .filter-option input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; }
  .filter-option .count { margin-left: auto; font-size: 11px; color: var(--muted); }

  .reset-btn {
    width: 100%;
    padding: 7px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    margin-bottom: 16px;
    transition: background 0.12s, color 0.12s;
  }
  .reset-btn:hover { background: var(--surface2); color: var(--text); }

  /* ── List ── */
  .list-panel {
    width: 320px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .list-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .search-box {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .search-box input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-box input:focus { border-color: var(--accent); }

  .list-scroll { overflow-y: auto; flex: 1; }

  .conv-card {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }
  .conv-card:hover { background: var(--surface2); }
  .conv-card.active { background: var(--surface2); border-left: 3px solid var(--accent); }

  .card-top {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .tag-grounded { background: var(--tag-grounded); color: #86efac; }
  .tag-ungrounded { background: var(--tag-ungrounded); color: #93c5fd; }
  .tag-identity { background: var(--tag-identity); color: #c4b5fd; }
  .tag-chat { background: var(--tag-chat); color: #7dd3fc; }
  .tag-voice { background: var(--tag-voice); color: #fca5a5; }
  .tag-lsw { background: #3d2e10; color: #fcd34d; }

  .card-lang { font-size: 13px; font-weight: 600; }
  .card-dialect { font-size: 11px; color: var(--muted); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { font-size: 11px; color: var(--muted); display: flex; gap: 10px; }

  /* ── Viewer ── */
  .viewer {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .viewer-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }

  .viewer-header .vh-top {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }

  .vh-title { font-size: 15px; font-weight: 600; }
  .vh-meta { font-size: 12px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; }
  .vh-meta span b { color: var(--text); }

  .viewer-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    gap: 8px;
  }
  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 14px; }

  .turn {
    display: flex;
    flex-direction: column;
    margin-bottom: 14px;
    max-width: 720px;
  }

  .turn.user { align-items: flex-end; }
  .turn.assistant { align-items: flex-start; }

  .turn-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .turn-bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    max-width: 600px;
  }

  .turn.user .turn-bubble {
    background: var(--chat-user);
    border-bottom-right-radius: 4px;
  }

  .turn.assistant .turn-bubble {
    background: var(--chat-agent);
    border-bottom-left-radius: 4px;
  }

  .turn-switch-badge {
    font-size: 10px;
    background: #3d2e10;
    color: #fcd34d;
    padding: 2px 8px;
    border-radius: 10px;
    margin-bottom: 4px;
  }

  .scenario-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }
  .scenario-block b { color: var(--text); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 100%; font-size: 14px; color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <h1>Conversation Data Review</h1>
  <span class="stats" id="headerStats">Loading…</span>
</header>

<div class="main">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="loading">Loading…</div>
  </aside>

  <!-- List -->
  <div class="list-panel">
    <div class="list-header">
      <span id="listCount">0 conversations</span>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search dialect, intent, occupation…">
    </div>
    <div class="list-scroll" id="listScroll"></div>
  </div>

  <!-- Viewer -->
  <div class="viewer">
    <div class="viewer-header" id="viewerHeader" style="display:none">
      <div class="vh-top" id="viewerTags"></div>
      <div class="vh-meta" id="viewerMeta"></div>
    </div>
    <div class="viewer-scroll" id="viewerScroll">
      <div class="empty-state">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M8 9h8M8 13h5M3 6a2 2 0 012-2h14a2 2 0 012 2v9a2 2 0 01-2 2H7l-4 4V6z"/>
        </svg>
        <p>Select a conversation to read it</p>
      </div>
    </div>
  </div>

</div>

<script>
const base = (() => {
  const p = location.pathname;
  return p.endsWith('/') ? p : p + '/';
})();

let allConvs = [];
let filtered = [];
let activeIdx = -1;
let filterState = {};

// ─── Load data ──────────────────────────────────────────────────────────────
fetch(base + 'data.json')
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(data => init(data))
  .catch(err => {
    document.getElementById('sidebar').innerHTML = `<div style="color:#f87171;padding:16px;font-size:13px">Failed to load data.json:<br>${err}</div>`;
  });

function init(data) {
  const { meta, conversations } = data;
  globalMeta = meta;
  allConvs = conversations;

  document.getElementById('headerStats').textContent =
    `${meta.total} conversations · ${meta.languages.length} languages`;

  // seed filterState
  filterState = {
    conv_type: new Set(meta.conv_types),
    mode: new Set(meta.modes),
    language: new Set(meta.languages),
    dialect: new Set(),  // computed from selected languages
    education: new Set(meta.education_levels),
    has_language_switch: new Set(['yes', 'no']),
  };

  buildSidebar(meta);
  applyFilters();
  setupSearch();
}

// ─── Sidebar ────────────────────────────────────────────────────────────────
function buildSidebar(meta) {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';

  const resetBtn = document.createElement('button');
  resetBtn.className = 'reset-btn';
  resetBtn.textContent = 'Reset all filters';
  resetBtn.onclick = () => {
    sidebar.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = true);
    syncFilterState();
    applyFilters();
  };
  sidebar.appendChild(resetBtn);

  const sections = [
    { key: 'conv_type', label: 'Type', values: meta.conv_types },
    { key: 'mode', label: 'Mode', values: meta.modes },
    { key: 'language', label: 'Language', values: meta.languages },
    { key: 'education', label: 'Education', values: meta.education_levels },
    { key: 'has_language_switch', label: 'Language Switch', values: ['yes', 'no'] },
  ];

  for (const { key, label, values } of sections) {
    const sec = document.createElement('div');
    sec.className = 'filter-section';
    sec.dataset.filterKey = key;
    const h3 = document.createElement('h3');
    h3.textContent = label;
    sec.appendChild(h3);

    for (const val of values) {
      const row = document.createElement('label');
      row.className = 'filter-option';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = true;
      cb.dataset.key = key;
      cb.dataset.val = val;
      cb.onchange = () => { syncFilterState(); applyFilters(); };
      const span = document.createElement('span');
      span.textContent = val;
      const countSpan = document.createElement('span');
      countSpan.className = 'count';
      countSpan.dataset.countFor = `${key}::${val}`;
      row.append(cb, span, countSpan);
      sec.appendChild(row);
    }

    sidebar.appendChild(sec);

    // Dialect section — dynamically after language
    if (key === 'language') {
      const dialectSec = document.createElement('div');
      dialectSec.className = 'filter-section';
      dialectSec.id = 'dialectSection';
      const dh3 = document.createElement('h3');
      dh3.textContent = 'Dialect';
      dialectSec.appendChild(dh3);
      sidebar.appendChild(dialectSec);
    }
  }

  rebuildDialectSection(meta);
}

function rebuildDialectSection(meta) {
  const sec = document.getElementById('dialectSection');
  if (!sec) return;
  // Keep header
  const h3 = sec.querySelector('h3');
  sec.innerHTML = '';
  sec.appendChild(h3);

  const selectedLangs = filterState.language;
  const dialects = new Set();
  for (const lang of selectedLangs) {
    for (const d of (meta?.dialects_by_lang?.[lang] || [])) {
      dialects.add(d);
    }
  }

  filterState.dialect = new Set(dialects);

  for (const d of [...dialects].sort()) {
    const row = document.createElement('label');
    row.className = 'filter-option';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = true;
    cb.dataset.key = 'dialect';
    cb.dataset.val = d;
    cb.onchange = () => { syncFilterState(); applyFilters(); };
    const span = document.createElement('span');
    span.textContent = d;
    span.style.fontSize = '12px';
    const countSpan = document.createElement('span');
    countSpan.className = 'count';
    countSpan.dataset.countFor = `dialect::${d}`;
    row.append(cb, span, countSpan);
    sec.appendChild(row);
  }
}

// Store meta globally for dialect rebuild
let globalMeta = null;
const origInit = window.init;

function syncFilterState() {
  document.querySelectorAll('input[data-key]').forEach(cb => {
    const { key, val } = cb.dataset;
    if (!filterState[key]) filterState[key] = new Set();
    if (cb.checked) filterState[key].add(val);
    else filterState[key].delete(val);
  });

  // Update dialect section when language selection changes
  if (globalMeta) {
    rebuildDialectSection(globalMeta);
    // Re-apply existing dialect checkbox state
    document.querySelectorAll('input[data-key=dialect]').forEach(cb => {
      if (filterState.dialect?.has(cb.dataset.val)) cb.checked = true;
    });
  }
}

// ─── Filtering ──────────────────────────────────────────────────────────────
function matchesFilters(c) {
  if (filterState.conv_type && !filterState.conv_type.has(c.conv_type)) return false;
  if (filterState.mode && !filterState.mode.has(c.mode)) return false;
  if (filterState.language && !filterState.language.has(c.language)) return false;
  if (filterState.dialect?.size > 0 && !filterState.dialect.has(c.dialect)) return false;
  if (filterState.education && !filterState.education.has(c.education)) return false;
  const lswVal = c.has_language_switch ? 'yes' : 'no';
  if (filterState.has_language_switch && !filterState.has_language_switch.has(lswVal)) return false;
  return true;
}

function matchesSearch(c, query) {
  if (!query) return true;
  const q = query.toLowerCase();
  return (
    c.dialect?.toLowerCase().includes(q) ||
    c.language?.toLowerCase().includes(q) ||
    c.intent?.toLowerCase().includes(q) ||
    c.life_sphere?.toLowerCase().includes(q) ||
    c.occupation?.toLowerCase().includes(q) ||
    c.state?.toLowerCase().includes(q) ||
    c.education?.toLowerCase().includes(q)
  );
}

function applyFilters() {
  const query = document.getElementById('searchInput')?.value || '';
  filtered = allConvs.filter(c => matchesFilters(c) && matchesSearch(c, query));
  renderList();
  updateCounts();
  if (activeIdx >= 0 && activeIdx < filtered.length) {
    renderViewer(filtered[activeIdx]);
  } else {
    activeIdx = -1;
    clearViewer();
  }
}

// ─── List ───────────────────────────────────────────────────────────────────
function renderList() {
  const scroll = document.getElementById('listScroll');
  document.getElementById('listCount').textContent =
    `${filtered.length} conversation${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    scroll.innerHTML = '<div style="padding:20px;color:var(--muted);font-size:13px;text-align:center">No matches</div>';
    return;
  }

  const frag = document.createDocumentFragment();
  filtered.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'conv-card' + (i === activeIdx ? ' active' : '');
    card.onclick = () => selectConv(i);

    const top = document.createElement('div');
    top.className = 'card-top';
    top.innerHTML = `
      <span class="tag tag-${c.conv_type}">${c.conv_type}</span>
      <span class="tag tag-${c.mode}">${c.mode}</span>
      ${c.has_language_switch ? '<span class="tag tag-lsw">L-switch</span>' : ''}
    `;

    const lang = document.createElement('div');
    lang.className = 'card-lang';
    lang.textContent = c.language;

    const dialect = document.createElement('div');
    dialect.className = 'card-dialect';
    dialect.textContent = c.dialect || '—';

    const meta = document.createElement('div');
    meta.className = 'card-meta';
    meta.innerHTML = `<span>${c.education || '—'}</span><span>${c.turns_used} turns</span>`;

    card.append(top, lang, dialect, meta);
    frag.appendChild(card);
  });

  scroll.innerHTML = '';
  scroll.appendChild(frag);
}

function selectConv(i) {
  activeIdx = i;
  document.querySelectorAll('.conv-card').forEach((el, idx) => {
    el.classList.toggle('active', idx === i);
  });
  renderViewer(filtered[i]);
}

// ─── Viewer ─────────────────────────────────────────────────────────────────
function renderViewer(c) {
  const header = document.getElementById('viewerHeader');
  const tagsEl = document.getElementById('viewerTags');
  const metaEl = document.getElementById('viewerMeta');
  const scroll = document.getElementById('viewerScroll');

  header.style.display = '';

  tagsEl.innerHTML = `
    <span class="tag tag-${c.conv_type}">${c.conv_type}</span>
    <span class="tag tag-${c.mode}">${c.mode}</span>
    ${c.has_language_switch ? '<span class="tag tag-lsw">Language Switch</span>' : ''}
    <span class="vh-title">${c.language} · ${c.dialect || '—'}</span>
  `;

  metaEl.innerHTML = `
    <span><b>Education:</b> ${c.education || '—'}</span>
    <span><b>Age/Sex:</b> ${c.age || '—'} · ${c.sex || '—'}</span>
    <span><b>Occupation:</b> ${c.occupation || '—'}</span>
    <span><b>State:</b> ${c.state || '—'}</span>
    <span><b>Topic:</b> ${c.life_sphere || c.intent || '—'}</span>
    <span><b>Turns:</b> ${c.turns_used}</span>
    ${c.identity_subtype ? `<span><b>Identity subtype:</b> ${c.identity_subtype}</span>` : ''}
    ${c.orientation ? `<span><b>Orientation:</b> ${c.orientation}</span>` : ''}
  `;

  scroll.innerHTML = '';

  // Language switches index for badge display
  const lswMap = {};
  if (c.language_switches) {
    for (const [turnIdx, info] of Object.entries(c.language_switches)) {
      lswMap[parseInt(turnIdx)] = info;
    }
  }

  const turns = c.conversation || [];
  turns.forEach((turn, i) => {
    const wrapper = document.createElement('div');
    wrapper.className = `turn ${turn.role}`;

    const lsw = lswMap[i];
    if (lsw) {
      const badge = document.createElement('div');
      badge.className = 'turn-switch-badge';
      badge.textContent = `↳ Language switch → ${lsw.lang}${lsw.is_switch_back ? ' (switch back)' : ''}`;
      wrapper.appendChild(badge);
    }

    const label = document.createElement('div');
    label.className = 'turn-label';
    label.textContent = turn.role === 'user' ? 'User' : 'Sarvam AI';

    const bubble = document.createElement('div');
    bubble.className = 'turn-bubble';
    bubble.textContent = turn.content || '';

    wrapper.append(label, bubble);
    scroll.appendChild(wrapper);
  });

  scroll.scrollTop = 0;
}

function clearViewer() {
  document.getElementById('viewerHeader').style.display = 'none';
  document.getElementById('viewerScroll').innerHTML = `
    <div class="empty-state">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M8 9h8M8 13h5M3 6a2 2 0 012-2h14a2 2 0 012 2v9a2 2 0 01-2 2H7l-4 4V6z"/>
      </svg>
      <p>Select a conversation to read it</p>
    </div>`;
}

// ─── Counts ─────────────────────────────────────────────────────────────────
function updateCounts() {
  const countMap = {};
  allConvs.forEach(c => {
    const groups = [
      ['conv_type', c.conv_type],
      ['mode', c.mode],
      ['language', c.language],
      ['dialect', c.dialect],
      ['education', c.education],
      ['has_language_switch', c.has_language_switch ? 'yes' : 'no'],
    ];
    for (const [k, v] of groups) {
      const key = `${k}::${v}`;
      countMap[key] = (countMap[key] || 0) + 1;
    }
  });

  document.querySelectorAll('[data-count-for]').forEach(el => {
    const total = countMap[el.dataset.countFor] || 0;
    el.textContent = total;
  });
}

// ─── Search ─────────────────────────────────────────────────────────────────
function setupSearch() {
  const input = document.getElementById('searchInput');
  let timer;
  input.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => applyFilters(), 200);
  });
}

</script>
</body>
</html>
